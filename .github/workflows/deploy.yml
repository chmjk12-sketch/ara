name: Deploy ARA

on:
  push:
    branches: [main]

env:
  APP_NAME: ara
  APP_PORT: "8091"
  REGISTRY_URL: crpi-2hhvyuuzflfxsyey.cn-beijing.personal.cr.aliyuncs.com
  REGISTRY_NAMESPACE: chmjk67

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:latest
            ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }}

      - name: Deploy to ECS
        id: ssh-deploy
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          script: |
            docker stop ara_app 2>/dev/null || true
            docker rm ara_app 2>/dev/null || true
            docker run -d \
              --name ara_app \
              --restart unless-stopped \
              --network caddy-net \
              -p ${{ env.APP_PORT }}:80 \
              -e DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
              -e DEEPSEEK_BASE_URL="${{ secrets.DEEPSEEK_BASE_URL }}" \
              -e CP_API_KEY="${{ secrets.API_KEY }}" \
              -e CP_BASE_URL="${{ secrets.ACP_BASE_URL }}" \
              -e AGENT_SLUG="${{ secrets.AGENT_SLUG }}" \
              -e AGENT_ID="${{ secrets.AGENT_ID }}" \
              ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }}
            sleep 5
            curl -sf http://127.0.0.1:${{ env.APP_PORT }}/health && echo "HEALTH_OK" || echo "HEALTH_FAIL"

      - name: Deploy via RunCommand API (fallback)
        if: steps.ssh-deploy.outcome == 'failure'
        run: |
          python3 -c "
import json, hmac, hashlib, base64, urllib.request, urllib.parse, uuid
from datetime import datetime, timezone, time as t

AK_ID='${{ secrets.ALIYUN_ACCESS_KEY_ID }}'
AK_SECRET='${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}'

def sign(p):
    sp=sorted(p.items()); Q=urllib.parse.quote
    q='&'.join(Q(k,'')+'='+Q(v,'') for k,v in sp)
    s='GET&'+Q('/','')+'&'+Q(q,'')
    sig=base64.b64encode(hmac.new((AK_SECRET+'&').encode(),s.encode(),hashlib.sha1).digest()).decode()
    return q+'&Signature='+Q(sig,'')

def run_cmd(cmd, timeout=120):
    b64=base64.b64encode(cmd.encode()).decode()
    p={'Action':'RunCommand','RegionId':'cn-beijing','InstanceId.1':'i-2zeee6djmc1qhwptmz1l','Type':'RunShellScript','CommandContent':b64,'ContentEncoding':'Base64','Timeout':str(timeout),'Format':'JSON','Version':'2014-05-26','AccessKeyId':AK_ID,'SignatureMethod':'HMAC-SHA1','SignatureVersion':'1.0','Timestamp':datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),'SignatureNonce':str(uuid.uuid4())}
    r=urllib.request.urlopen('https://ecs.aliyuncs.com/?'+sign(p),timeout=15)
    iid=json.loads(r.read())['InvokeId']
    for _ in range(timeout//5):
        t.sleep(5)
        p2={'Action':'DescribeInvocationResults','RegionId':'cn-beijing','InvokeId':iid,'Format':'JSON','Version':'2014-05-26','AccessKeyId':AK_ID,'SignatureMethod':'HMAC-SHA1','SignatureVersion':'1.0','Timestamp':datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),'SignatureNonce':str(uuid.uuid4())}
        r2=urllib.request.urlopen('https://ecs.aliyuncs.com/?'+sign(p2),timeout=15)
        for res in json.loads(r2.read()).get('Invocation',{}).get('InvocationResults',{}).get('InvocationResult',[]):
            if res.get('InvocationStatus') in ('Success','Failed','Finished'):
                o=res.get('Output','') or ''
                print(base64.b64decode(o).decode('utf-8','replace') if o else res['InvocationStatus'])
                return

deploy_cmd='''docker stop ara_app 2>/dev/null; docker rm ara_app 2>/dev/null
docker run -d --name ara_app --restart unless-stopped --network caddy-net -p ${{ env.APP_PORT }}:80 \
  -e DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }} \
  -e DEEPSEEK_BASE_URL=${{ secrets.DEEPSEEK_BASE_URL }} \
  -e CP_API_KEY=${{ secrets.API_KEY }} \
  -e CP_BASE_URL=${{ secrets.ACP_BASE_URL }} \
  -e AGENT_SLUG=${{ secrets.AGENT_SLUG }} \
  -e AGENT_ID=${{ secrets.AGENT_ID }} \
  ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }}
sleep 5; curl -sf http://127.0.0.1:${{ env.APP_PORT }}/health && echo HEALTH_OK || echo HEALTH_FAIL'''
run_cmd(deploy_cmd)
          "

      - name: Configure Caddy & DNS
        run: |
          python3 -c "
import json, hmac, hashlib, base64, urllib.request, urllib.parse, uuid
from datetime import datetime, timezone

AK_ID='${{ secrets.ALIYUN_ACCESS_KEY_ID }}'
AK_SECRET='${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}'

def sign(p):
    sp=sorted(p.items()); Q=urllib.parse.quote
    q='&'.join(Q(k,'')+'='+Q(v,'') for k,v in sp)
    s='GET&'+Q('/','')+'&'+Q(q,'')
    sig=base64.b64encode(hmac.new((AK_SECRET+'&').encode(),s.encode(),hashlib.sha1).digest()).decode()
    return q+'&Signature='+Q(sig,'')

def run_cmd(cmd, timeout=60):
    b64=base64.b64encode(cmd.encode()).decode()
    p={'Action':'RunCommand','RegionId':'cn-beijing','InstanceId.1':'i-2zeee6djmc1qhwptmz1l','Type':'RunShellScript','CommandContent':b64,'ContentEncoding':'Base64','Timeout':str(timeout),'Format':'JSON','Version':'2014-05-26','AccessKeyId':AK_ID,'SignatureMethod':'HMAC-SHA1','SignatureVersion':'1.0','Timestamp':datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),'SignatureNonce':str(uuid.uuid4())}
    r=urllib.request.urlopen('https://ecs.aliyuncs.com/?'+sign(p),timeout=15)
    iid=json.loads(r.read())['InvokeId']
    import time
    for _ in range(timeout//5):
        time.sleep(5)
        p2={'Action':'DescribeInvocationResults','RegionId':'cn-beijing','InvokeId':iid,'Format':'JSON','Version':'2014-05-26','AccessKeyId':AK_ID,'SignatureMethod':'HMAC-SHA1','SignatureVersion':'1.0','Timestamp':datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),'SignatureNonce':str(uuid.uuid4())}
        r2=urllib.request.urlopen('https://ecs.aliyuncs.com/?'+sign(p2),timeout=15)
        for res in json.loads(r2.read()).get('Invocation',{}).get('InvocationResults',{}).get('InvocationResult',[]):
            if res.get('InvocationStatus') in ('Success','Failed','Finished'):
                o=res.get('Output','') or ''
                print(base64.b64decode(o).decode('utf-8','replace') if o else res['InvocationStatus'])
                return

# Caddy config
caddy_cmd='''if ! grep -q \"ara.chmjk67.top\" /etc/caddy/Caddyfile; then
  echo \"\" >> /etc/caddy/Caddyfile
  echo \"ara.chmjk67.top {\" >> /etc/caddy/Caddyfile
  echo \"    reverse_proxy ara_app:80\" >> /etc/caddy/Caddyfile
  echo \"}\" >> /etc/caddy/Caddyfile
  docker exec caddy caddy reload --config /etc/caddy/Caddyfile
  echo Caddy configured
else
  echo Caddy already configured
fi'''
print('Configuring Caddy...')
run_cmd(caddy_cmd)

# DNS
dns_cmd='''pip install aliyun-python-sdk-core aliyun-python-sdk-alidns -q 2>/dev/null
python3 -c \"
from aliyunsdkcore.client import AcsClient
from aliyunsdkalidns.request.v20150109.AddDomainRecordRequest import AddDomainRecordRequest
from aliyunsdkalidns.request.v20150109.DescribeDomainRecordsRequest import DescribeDomainRecordsRequest
import json
client = AcsClient('${{ secrets.ALIYUN_ACCESS_KEY_ID }}', '${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}', 'cn-beijing')
req = DescribeDomainRecordsRequest()
req.set_DomainName('chmjk67.top')
req.set_RRKeyWord('ara')
resp = client.do_action_with_exception(req)
records = json.loads(resp)['DomainRecords']['Record']
exists = any(r['RR'] == 'ara' and r['Type'] == 'A' for r in records)
if not exists:
    add_req = AddDomainRecordRequest()
    add_req.set_DomainName('chmjk67.top')
    add_req.set_RR('ara')
    add_req.set_Type('A')
    add_req.set_Value('${{ secrets.DEPLOY_HOST }}')
    client.do_action_with_exception(add_req)
    print('DNS record created')
else:
    print('DNS record already exists')
\"'''
print('Configuring DNS...')
run_cmd(dns_cmd, timeout=120)
          "

      - name: Notify ACP of deployment
        run: |
          python3 << 'PYEOF'
          import requests
          ACP = "${{ secrets.ACP_BASE_URL }}"
          AGENT_ID = "${{ secrets.AGENT_ID }}"
          try:
              requests.post(f"{ACP}/api/agents/{AGENT_ID}/versions", json={
                  "versionTag": "${{ github.sha }}"[0:7],
                  "codeRef": "https://github.com/chmjk12-sketch/${{ env.APP_NAME }}",
              }, timeout=10)
              requests.post(f"{ACP}/api/deployments", json={
                  "agentId": AGENT_ID,
                  "gitCommit": "${{ github.sha }}",
                  "imageTag": "${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }}",
                  "slot": "blue", "trafficWeight": 100,
                  "status": "success", "triggerSource": "github_actions",
              }, timeout=10)
              requests.post(f"{ACP}/api/agents/{AGENT_ID}/online", timeout=10)
              print("ACP notified")
          except Exception as e:
              print(f"ACP notify error: {e}")
          PYEOF

      - name: Verify deployment
        run: |
          sleep 5
          echo "=== Stage 1: Container port ==="
          curl -sf "http://${{ secrets.DEPLOY_HOST }}:${{ env.APP_PORT }}/health" && echo " OK" || echo " FAIL"
          echo "=== Stage 2: HTTPS ==="
          curl -skf "https://ara.chmjk67.top/health" && echo " OK" || echo " FAIL (DNS may take a few minutes)"
