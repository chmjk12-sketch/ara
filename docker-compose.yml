version: "3.8"
services:
  app:
    build: .
    ports:
      - "8080:80"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:80/health'); assert r.status_code == 200"]
      interval: 30s
      timeout: 10s
      retries: 3
