name: Deploy ARA

on:
  push:
    branches: [main]

env:
  APP_NAME: ara
  APP_PORT: "9000"
  REGISTRY_URL: crpi-2hhvyuuzflfxsyey.cn-beijing.personal.cr.aliyuncs.com
  REGISTRY_NAMESPACE: chmjk67

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          no-cache: true
          tags: |
            ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:latest
            ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }}

      - name: Deploy to ECS via RunCommand API
        env:
          AK_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          AK_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
        run: |
          pip install requests -q
          python3 -c "
          import json, hmac, hashlib, base64, urllib.request, urllib.parse, uuid, time, os
          from datetime import datetime, timezone

          AK_ID = os.environ['AK_ID']
          AK_SECRET = os.environ['AK_SECRET']
          REGISTRY_URL = os.environ['REGISTRY_URL']
          REGISTRY_NAMESPACE = os.environ['REGISTRY_NAMESPACE']
          APP_NAME = os.environ['APP_NAME']
          APP_PORT = os.environ['APP_PORT']
          IMAGE_TAG = 'latest'

          def sign(params):
              sp = sorted(params.items())
              Q = urllib.parse.quote
              q = '&'.join(Q(k,'')+'='+Q(v,'') for k,v in sp)
              s = 'GET&'+Q('/','')+'&'+Q(q,'')
              sig = base64.b64encode(hmac.new((AK_SECRET+'&').encode(), s.encode(), hashlib.sha1).digest()).decode()
              return q+'&Signature='+Q(sig,'')

          def run_cmd(cmd, timeout=120):
              b64 = base64.b64encode(cmd.encode()).decode()
              p = {
                  'Action': 'RunCommand', 'RegionId': 'cn-beijing',
                  'InstanceId.1': 'i-2zeee6djmc1qhwptmz1l',
                  'Type': 'RunShellScript',
                  'CommandContent': b64, 'ContentEncoding': 'Base64',
                  'Timeout': str(timeout),
                  'Format': 'JSON', 'Version': '2014-05-26',
                  'AccessKeyId': AK_ID, 'SignatureMethod': 'HMAC-SHA1',
                  'SignatureVersion': '1.0',
                  'Timestamp': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
                  'SignatureNonce': str(uuid.uuid4())
              }
              r = urllib.request.urlopen('https://ecs.aliyuncs.com/?'+sign(p), timeout=15)
              iid = json.loads(r.read())['InvokeId']
              for _ in range(timeout//10 + 1):
                  time.sleep(10)
                  p2 = {
                      'Action': 'DescribeInvocationResults', 'RegionId': 'cn-beijing',
                      'InvokeId': iid, 'Format': 'JSON', 'Version': '2014-05-26',
                      'AccessKeyId': AK_ID, 'SignatureMethod': 'HMAC-SHA1',
                      'SignatureVersion': '1.0',
                      'Timestamp': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
                      'SignatureNonce': str(uuid.uuid4())
                  }
                  r2 = urllib.request.urlopen('https://ecs.aliyuncs.com/?'+sign(p2), timeout=15)
                  res_list = json.loads(r2.read()).get('Invocation',{}).get('InvocationResults',{}).get('InvocationResult',[])
                  for res in res_list:
                      if res.get('InvocationStatus') in ('Success','Failed','Finished'):
                          o = res.get('Output','') or ''
                          output = base64.b64decode(o).decode('utf-8','replace')
                          print(output)
                          if res.get('InvocationStatus') == 'Failed':
                              raise Exception('Remote command failed: ' + output[-200:])
                          return output

          deploy_cmd = (
              'docker login --username=' + os.environ.get('REGISTRY_USERNAME','') +
              ' --password=' + os.environ.get('REGISTRY_PASSWORD','') +
              ' ' + REGISTRY_URL + ' 2>/dev/null && '
              'docker pull ' + REGISTRY_URL + '/' + REGISTRY_NAMESPACE + '/' + APP_NAME + ':' + IMAGE_TAG + ' && '
              'docker stop ara 2>/dev/null; docker rm ara 2>/dev/null; '
              'docker stop ara_app 2>/dev/null; docker rm ara_app 2>/dev/null; '
              'docker run -d --name ' + APP_NAME + ' --restart always -p ' + APP_PORT + ':80 '
              '-e OPENAI_API_KEY=' + os.environ.get('DEEPSEEK_API_KEY','') + ' '
              '-e OPENAI_BASE_URL=' + os.environ.get('DEEPSEEK_BASE_URL','https://api.deepseek.com/v1') + ' '
              '-e OPENAI_MODEL=deepseek-chat '
              '-e NOTION_TOKEN=' + os.environ.get('NOTION_TOKEN','') + ' '
              '-e NOTION_PARENT_PAGE_ID=' + os.environ.get('NOTION_PARENT_PAGE_ID','') + ' '
              '-e MAX_DEPTH=3 -e DEFAULT_DEPTH=1 -e MAX_TOKENS=4000 -e TEMPERATURE=0.7 '
              '-e LOG_LEVEL=INFO -e API_HOST=0.0.0.0 -e API_PORT=8000 '
              '-e CORS_ORIGINS=* -e RATE_LIMIT=60 -e REQUEST_TIMEOUT=30 '
              + REGISTRY_URL + '/' + REGISTRY_NAMESPACE + '/' + APP_NAME + ':' + IMAGE_TAG + ' && '
              'sleep 5 && '
              'docker ps --filter name=' + APP_NAME + ' --format \"{{.Names}}: {{.Status}}\" && '
              'curl -sf http://127.0.0.1:' + APP_PORT + '/health && echo HEALTH_OK || echo HEALTH_FAIL'
          )
          run_cmd(deploy_cmd, timeout=120)
          "

      - name: Configure Caddy via RunCommand
        env:
          AK_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          AK_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          python3 -c "
          import json, hmac, hashlib, base64, urllib.request, urllib.parse, uuid, time, os
          from datetime import datetime, timezone

          AK_ID = os.environ['AK_ID']
          AK_SECRET = os.environ['AK_SECRET']

          def sign(params):
              sp = sorted(params.items())
              Q = urllib.parse.quote
              q = '&'.join(Q(k,'')+'='+Q(v,'') for k,v in sp)
              s = 'GET&'+Q('/','')+'&'+Q(q,'')
              sig = base64.b64encode(hmac.new((AK_SECRET+'&').encode(), s.encode(), hashlib.sha1).digest()).decode()
              return q+'&Signature='+Q(sig,'')

          def run_cmd(cmd, timeout=60):
              b64 = base64.b64encode(cmd.encode()).decode()
              p = {
                  'Action': 'RunCommand', 'RegionId': 'cn-beijing',
                  'InstanceId.1': 'i-2zeee6djmc1qhwptmz1l',
                  'Type': 'RunShellScript',
                  'CommandContent': b64, 'ContentEncoding': 'Base64',
                  'Timeout': str(timeout),
                  'Format': 'JSON', 'Version': '2014-05-26',
                  'AccessKeyId': AK_ID, 'SignatureMethod': 'HMAC-SHA1',
                  'SignatureVersion': '1.0',
                  'Timestamp': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
                  'SignatureNonce': str(uuid.uuid4())
              }
              r = urllib.request.urlopen('https://ecs.aliyuncs.com/?'+sign(p), timeout=15)
              iid = json.loads(r.read())['InvokeId']
              for _ in range(timeout//5 + 1):
                  time.sleep(5)
                  p2 = {
                      'Action': 'DescribeInvocationResults', 'RegionId': 'cn-beijing',
                      'InvokeId': iid, 'Format': 'JSON', 'Version': '2014-05-26',
                      'AccessKeyId': AK_ID, 'SignatureMethod': 'HMAC-SHA1',
                      'SignatureVersion': '1.0',
                      'Timestamp': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
                      'SignatureNonce': str(uuid.uuid4())
                  }
                  r2 = urllib.request.urlopen('https://ecs.aliyuncs.com/?'+sign(p2), timeout=15)
                  res_list = json.loads(r2.read()).get('Invocation',{}).get('InvocationResults',{}).get('InvocationResult',[])
                  for res in res_list:
                      if res.get('InvocationStatus') in ('Success','Failed','Finished'):
                          o = res.get('Output','') or ''
                          print(base64.b64decode(o).decode('utf-8','replace'))
                          return

          caddy_cmd = (
              'SERVER_IP=$(ip route get 1.1.1.1 2>/dev/null | grep -oP "src \\K[0-9.]+" || hostname -I | awk "{print \\$1}") && '
              'printf "%s\\n" "sunshine.chmjk67.top {" "    reverse_proxy sunshine_app:80" "}" "" "ara.chmjk67.top {" "    reverse_proxy ${SERVER_IP}:9000" "}" | docker exec -i caddy tee /etc/caddy/Caddyfile && '
              'docker exec caddy caddy reload --config /etc/caddy/Caddyfile && '
              'echo Caddy configured'
          )
          run_cmd(caddy_cmd, timeout=60)
          "

      - name: Verify deployment
        run: |
          sleep 5
          echo "=== Health Check (HTTPS) ==="
          curl -sf "https://ara.chmjk67.top/health" && echo " OK" || echo " FAIL"
          echo "=== CSS Check ==="
          CSS_SIZE=$(curl -sf "https://ara.chmjk67.top/static/style.css" | wc -c)
          echo "CSS size: ${CSS_SIZE} bytes"
          echo "=== Deployment Complete ==="
