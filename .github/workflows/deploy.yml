name: Deploy ARA

on:
  push:
    branches: [main]

env:
  APP_NAME: ara
  APP_PORT: "8091"
  REGISTRY_URL: crpi-2hhvyuuzflfxsyey.cn-beijing.personal.cr.aliyuncs.com
  REGISTRY_NAMESPACE: chmjk67

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:latest
            ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }}

      - name: Deploy to ECS via SSH
        id: ssh-deploy
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          script: |
            docker stop ara_app 2>/dev/null || true
            docker rm ara_app 2>/dev/null || true
            docker run -d \
              --name ara_app \
              --restart unless-stopped \
              --network caddy-net \
              -p ${{ env.APP_PORT }}:80 \
              -e DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }} \
              -e DEEPSEEK_BASE_URL=${{ secrets.DEEPSEEK_BASE_URL }} \
              -e CP_API_KEY=${{ secrets.API_KEY }} \
              -e CP_BASE_URL=${{ secrets.ACP_BASE_URL }} \
              -e AGENT_SLUG=${{ secrets.AGENT_SLUG }} \
              -e AGENT_ID=${{ secrets.AGENT_ID }} \
              -e NOTION_TOKEN=${{ secrets.NOTION_TOKEN }} \
              -e NOTION_PARENT_PAGE_ID=${{ secrets.NOTION_PARENT_PAGE_ID }} \
              ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }}
            sleep 5
            curl -sf http://127.0.0.1:${{ env.APP_PORT }}/health && echo "HEALTH_OK" || echo "HEALTH_FAIL"

      - name: Deploy to ECS via RunCommand (fallback)
        if: steps.ssh-deploy.outcome == 'failure'
        run: |
          pip install requests -q
          python3 /tmp/run_ecs.py

      - name: Configure Caddy
        uses: appleboy/ssh-action@v1.2.2
        continue-on-error: true
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 30s
          script: |
            if ! grep -q "ara.chmjk67.top" /etc/caddy/Caddyfile; then
              echo "" >> /etc/caddy/Caddyfile
              echo "ara.chmjk67.top {" >> /etc/caddy/Caddyfile
              echo "    reverse_proxy ara_app:80" >> /etc/caddy/Caddyfile
              echo "}" >> /etc/caddy/Caddyfile
              docker exec caddy caddy reload --config /etc/caddy/Caddyfile
              echo "Caddy configured"
            else
              echo "Caddy already configured"
            fi

      - name: Configure DNS
        continue-on-error: true
        run: |
          pip install aliyun-python-sdk-core aliyun-python-sdk-alidns -q
          python3 -c "
          from aliyunsdkcore.client import AcsClient
          from aliyunsdkalidns.request.v20150109.AddDomainRecordRequest import AddDomainRecordRequest
          from aliyunsdkalidns.request.v20150109.DescribeDomainRecordsRequest import DescribeDomainRecordsRequest
          import json
          client = AcsClient('${{ secrets.ALIYUN_ACCESS_KEY_ID }}', '${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}', 'cn-beijing')
          req = DescribeDomainRecordsRequest()
          req.set_DomainName('chmjk67.top')
          req.set_RRKeyWord('ara')
          resp = client.do_action_with_exception(req)
          records = json.loads(resp)['DomainRecords']['Record']
          exists = any(r['RR'] == 'ara' and r['Type'] == 'A' for r in records)
          if not exists:
              add_req = AddDomainRecordRequest()
              add_req.set_DomainName('chmjk67.top')
              add_req.set_RR('ara')
              add_req.set_Type('A')
              add_req.set_Value('${{ secrets.DEPLOY_HOST }}')
              client.do_action_with_exception(add_req)
              print('DNS record created')
          else:
              print('DNS record already exists')
          "

      - name: Notify ACP
        continue-on-error: true
        run: |
          pip install requests -q
          python3 -c "
          import requests
          ACP = '${{ secrets.ACP_BASE_URL }}'
          AGENT_ID = '${{ secrets.AGENT_ID }}'
          SHA = '${{ github.sha }}'
          requests.post(f'{ACP}/api/agents/{AGENT_ID}/versions', json={'versionTag': SHA[:7], 'codeRef': 'https://github.com/chmjk12-sketch/ara'}, timeout=10)
          requests.post(f'{ACP}/api/deployments', json={'agentId': AGENT_ID, 'gitCommit': SHA, 'imageTag': '${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/ara:' + SHA, 'slot': 'blue', 'trafficWeight': 100, 'status': 'success', 'triggerSource': 'github_actions'}, timeout=10)
          requests.post(f'{ACP}/api/agents/{AGENT_ID}/online', timeout=10)
          print('ACP notified')
          "

      - name: Verify deployment
        run: |
          sleep 5
          echo "=== Stage 1: Container port ==="
          curl -sf "http://${{ secrets.DEPLOY_HOST }}:${{ env.APP_PORT }}/health" && echo " OK" || echo " FAIL"
          echo "=== Stage 2: HTTPS ==="
          curl -skf "https://ara.chmjk67.top/health" && echo " OK" || echo " FAIL (DNS may take a few minutes)"
